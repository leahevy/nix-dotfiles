name: Update Flake.lock
on:
  schedule:
    - cron: '0 1 * 4-10 0,1,2,3,5,6'
    - cron: '0 2 * 11,12,1,2,3 0,1,2,3,5,6'
  workflow_dispatch:
  pull_request:
    types: [closed]

concurrency:
  group: update-flake-lock
  cancel-in-progress: false

jobs:
  update-flake-lock:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Load definitions
        run: |
          source scripts/utils/defs.sh
          echo "UPDATE_INPUTS=$(IFS=,; echo "${AUTO_UPDATE_INPUTS[*]}")" >> $GITHUB_ENV
          echo "REBOOT_NORMAL_CHECK_INPUTS=$(IFS=,; echo "${REBOOT_NORMAL_CHECK_INPUTS[*]}")" >> $GITHUB_ENV
          echo "REBOOT_NIX_CHECK_INPUTS=$(IFS=,; echo "${REBOOT_NIX_CHECK_INPUTS[*]}")" >> $GITHUB_ENV
          echo "EXCLUDE_FROM_REBOOT_CHECK=$(printf '%s\n' "${AUTO_UPDATE_INPUTS[@]}" | grep -vxF -f <(printf '%s\n' "${REBOOT_NORMAL_CHECK_INPUTS[@]}" "${REBOOT_NIX_CHECK_INPUTS[@]}") | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_ENV
          echo "PACKAGES_TO_HIGHLIGHT=$(IFS=,; echo "${PACKAGES_TO_HIGHLIGHT[*]}")" >> $GITHUB_ENV
          echo "NIXPKGS_INPUTS=$(IFS=,; echo "${NIXPKGS_INPUTS[*]}")" >> $GITHUB_ENV
          echo "TRUNCATE_INPUTS=$(IFS=,; echo "${TRUNCATE_INPUTS[*]}")" >> $GITHUB_ENV
          echo "UPDATE_AUTO_MERGE_ENABLED=$UPDATE_AUTO_MERGE_ENABLED" >> $GITHUB_ENV
          echo "TEST_EVAL_ENABLED=$TEST_EVAL_ENABLED" >> $GITHUB_ENV

      - name: Validate auto-merge token
        if: env.UPDATE_AUTO_MERGE_ENABLED == 'true'
        env:
          REPO_PR_TOKEN: ${{ secrets.REPO_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${REPO_PR_TOKEN:-}" ]; then
            echo "::error::UPDATE_AUTO_MERGE_ENABLED is true but the REPO_PR_TOKEN secret is not set!"
            exit 1
          fi

      - name: Guard - auto-merge not yet supported
        if: env.UPDATE_AUTO_MERGE_ENABLED == 'true'
        run: |
          echo "::error::Auto-merge is not yet supported. It requires signed commits (sign-commits: true), which only work with a GitHub App token."
          exit 1

      - name: Determine cycle mode and check existing PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_get() {
            curl --retry 5 --retry-all-errors --retry-delay 2 --retry-connrefused \
              --connect-timeout 10 -m 60 -fsS \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          dow=$(date +%u)

          IS_FIRST_MERGE_DAY=false

          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "$dow" -lt 5 ]; then
            CYCLE_MODE=update
          else
            CYCLE_MODE=merge
            if [ "$dow" -eq 5 ]; then IS_FIRST_MERGE_DAY=true; fi
          fi

          echo "CYCLE_MODE=$CYCLE_MODE" >> $GITHUB_ENV
          echo "IS_FIRST_MERGE_DAY=$IS_FIRST_MERGE_DAY" >> $GITHUB_ENV

          if [ "$dow" -ge 5 ]; then
            MERGE_CYCLE_ID="$(date +%GW%V)"
          else
            MERGE_CYCLE_ID=""
          fi
          echo "MERGE_CYCLE_ID=$MERGE_CYCLE_ID" >> $GITHUB_ENV

          if pulls_json=$(api_get "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:update-flake-inputs&state=open"); then
            PR_FETCH_OK=true
          else
            PR_FETCH_OK=false
            pulls_json=""
          fi
          existing_pr=$(printf '%s' "$pulls_json" | jq -c 'if type == "array" then (.[0] // empty) else empty end' 2>/dev/null || true)

          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            PR_EXISTS=true
            PR_NUMBER=$(printf '%s' "$existing_pr" | jq -r '.number')
            PR_DRAFT=$(printf '%s' "$existing_pr" | jq -r '.draft')

            PR_CONFLICTED=false
            if [ "$CYCLE_MODE" == "merge" ]; then
              mergeable=null
              delay=3
              for attempt in $(seq 1 6); do
                pr_detail=$(api_get "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER") || pr_detail=""
                mergeable=$(printf '%s' "$pr_detail" | jq -r '.mergeable // "null"' 2>/dev/null || echo null)
                [ "$mergeable" != "null" ] && break
                [ "$attempt" -eq 6 ] && break
                sleep "$delay"
                delay=$((delay * 2))
              done
              if [ "$mergeable" == "false" ]; then PR_CONFLICTED=true; fi
            fi

            pr_body=$(printf '%s' "$existing_pr" | jq -r '.body // ""')
            if printf '%s' "$pr_body" | grep -q '<!-- nx-reboot-system -->'; then
              PR_REQUIRES_SYSTEM_REBOOT=true
            elif ! printf '%s' "$pr_body" | grep -q '<!-- nx-reboot-desktop -->' && printf '%s' "$pr_body" | grep -qE "Reboot Required|Manual Merge Required \(Preserved\)"; then
              PR_REQUIRES_SYSTEM_REBOOT=true
            else
              PR_REQUIRES_SYSTEM_REBOOT=false
            fi
            if printf '%s' "$pr_body" | grep -q '<!-- nx-reboot-desktop -->'; then PR_REQUIRES_DESKTOP_REBOOT=true; else PR_REQUIRES_DESKTOP_REBOOT=false; fi
            if [ "$PR_REQUIRES_SYSTEM_REBOOT" = "true" ] || [ "$PR_REQUIRES_DESKTOP_REBOOT" = "true" ]; then PR_REQUIRES_REBOOT=true; else PR_REQUIRES_REBOOT=false; fi
            if printf '%s' "$pr_body" | grep -q '<!-- nx-commits-truncated -->'; then PR_COMMITS_TRUNCATED=true; elif printf '%s' "$pr_body" | grep -q "Manual Merge Required (Truncation)"; then PR_COMMITS_TRUNCATED=true; else PR_COMMITS_TRUNCATED=false; fi
            if printf '%s' "$pr_body" | grep -q '<!-- nx-eval-failed -->'; then PR_EVAL_FAILED=true; else PR_EVAL_FAILED=false; fi
            auto_merge=$(printf '%s' "$existing_pr" | jq -r '.auto_merge')
            if [ "$auto_merge" != "null" ] && [ -n "$auto_merge" ]; then PR_AUTO_MERGE_ENABLED=true; else PR_AUTO_MERGE_ENABLED=false; fi
            if printf '%s' "$existing_pr" | jq -e '.labels[]? | select(.name == "flake-merge-notified")' > /dev/null; then PR_MERGE_NOTIFIED=true; else PR_MERGE_NOTIFIED=false; fi
            if printf '%s' "$existing_pr" | jq -e '.labels[]? | select(.name == "flake-automerge-stuck")' > /dev/null; then PR_AUTOMERGE_STUCK_NOTIFIED=true; else PR_AUTOMERGE_STUCK_NOTIFIED=false; fi

            PR_CHECKS_FAILED=false
            if [ "$CYCLE_MODE" == "merge" ] && [ "$PR_AUTO_MERGE_ENABLED" == "true" ]; then
              head_sha=$(printf '%s' "$existing_pr" | jq -r '.head.sha')
              checkruns_json=$(api_get "https://api.github.com/repos/${{ github.repository }}/commits/$head_sha/check-runs") || checkruns_json=""
              status_json=$(api_get "https://api.github.com/repos/${{ github.repository }}/commits/$head_sha/status") || status_json=""
              failed_checks=$(printf '%s' "$checkruns_json" | jq -r '[.check_runs[]? | select(.conclusion=="failure" or .conclusion=="timed_out" or .conclusion=="cancelled" or .conclusion=="action_required" or .conclusion=="stale")] | length' 2>/dev/null || echo 0)
              failed_status=$(printf '%s' "$status_json" | jq -r 'if .state=="failure" or .state=="error" then 1 else 0 end' 2>/dev/null || echo 0)
              if [ "${failed_checks:-0}" -gt 0 ] || [ "${failed_status:-0}" -gt 0 ]; then PR_CHECKS_FAILED=true; fi
            fi
          else
            PR_EXISTS=false
            PR_NUMBER=""
            PR_DRAFT=false
            PR_CONFLICTED=false
            PR_REQUIRES_REBOOT=false
            PR_REQUIRES_SYSTEM_REBOOT=false
            PR_REQUIRES_DESKTOP_REBOOT=false
            PR_COMMITS_TRUNCATED=false
            PR_EVAL_FAILED=false
            PR_AUTO_MERGE_ENABLED=false
            PR_MERGE_NOTIFIED=false
            PR_AUTOMERGE_STUCK_NOTIFIED=false
            PR_CHECKS_FAILED=false
          fi

          echo "PR_EXISTS=$PR_EXISTS" >> $GITHUB_ENV
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "PR_DRAFT=$PR_DRAFT" >> $GITHUB_ENV
          echo "PR_CONFLICTED=$PR_CONFLICTED" >> $GITHUB_ENV
          echo "PR_REQUIRES_REBOOT=$PR_REQUIRES_REBOOT" >> $GITHUB_ENV
          echo "PR_REQUIRES_SYSTEM_REBOOT=$PR_REQUIRES_SYSTEM_REBOOT" >> $GITHUB_ENV
          echo "PR_REQUIRES_DESKTOP_REBOOT=$PR_REQUIRES_DESKTOP_REBOOT" >> $GITHUB_ENV
          echo "PR_COMMITS_TRUNCATED=$PR_COMMITS_TRUNCATED" >> $GITHUB_ENV
          echo "PR_EVAL_FAILED=$PR_EVAL_FAILED" >> $GITHUB_ENV
          echo "PR_AUTO_MERGE_ENABLED=$PR_AUTO_MERGE_ENABLED" >> $GITHUB_ENV
          echo "PR_MERGE_NOTIFIED=$PR_MERGE_NOTIFIED" >> $GITHUB_ENV
          echo "PR_AUTOMERGE_STUCK_NOTIFIED=$PR_AUTOMERGE_STUCK_NOTIFIED" >> $GITHUB_ENV
          echo "PR_CHECKS_FAILED=$PR_CHECKS_FAILED" >> $GITHUB_ENV
          echo "PR_FETCH_OK=$PR_FETCH_OK" >> $GITHUB_ENV

          RE_EVAL_ONLY=false
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "$PR_EXISTS" == "true" ] && [ "$PR_EVAL_FAILED" == "true" ] && [ "$TEST_EVAL_ENABLED" == "true" ]; then
            RE_EVAL_ONLY=true
          fi

          IS_UPDATE_RUN=false
          if [ "$CYCLE_MODE" == "update" ] && [ "$RE_EVAL_ONLY" != "true" ]; then
            if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "$PR_EXISTS" != "true" ]; then
              IS_UPDATE_RUN=true
            else
              echo "PR already exists (#$PR_NUMBER) - skipping flake update"
            fi
          fi
          if [ "$RE_EVAL_ONLY" == "true" ]; then
            echo "Existing PR #$PR_NUMBER has failed evaluations - re-evaluating current core against the pinned lock without regenerating inputs"
          fi
          echo "IS_UPDATE_RUN=$IS_UPDATE_RUN" >> $GITHUB_ENV
          echo "RE_EVAL_ONLY=$RE_EVAL_ONLY" >> $GITHUB_ENV

          echo "Cycle: $CYCLE_MODE, PR exists: $PR_EXISTS, PR conflicted: $PR_CONFLICTED, IS_UPDATE_RUN: $IS_UPDATE_RUN"

      - name: Guard - existing PR state required for update
        if: env.IS_UPDATE_RUN == 'true' && env.PR_FETCH_OK != 'true'
        run: |
          echo "::error::Could not fetch existing PR state from the GitHub API. Aborting this update run to avoid overwriting preserved reboot and merge markers on the open PR. The next scheduled run will retry!"
          exit 1

      - name: Update week - Reset merge reminder
        if: env.CYCLE_MODE == 'update' && env.PR_EXISTS == 'true'
        run: |
          set -euo pipefail
          gh pr edit "${{ env.PR_NUMBER }}" --remove-label flake-merge-notified > /dev/null 2>&1 || true
          gh pr edit "${{ env.PR_NUMBER }}" --remove-label flake-automerge-stuck > /dev/null 2>&1 || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        if: env.IS_UPDATE_RUN == 'true' || env.RE_EVAL_ONLY == 'true' || (env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && env.PR_EVAL_FAILED == 'true' && env.TEST_EVAL_ENABLED == 'true')
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Extract commit hashes before update
        if: env.IS_UPDATE_RUN == 'true'
        run: |
          set -euo pipefail

          metadata=$(nix flake metadata --json .)

          IFS=',' read -ra inputs <<< "$UPDATE_INPUTS"

          for input in "${inputs[@]}"; do
            input=$(echo "$input" | xargs)
            input_var=$(echo "$input" | tr '-' '_')
            node=$(printf '%s' "$metadata" | jq -r --arg input "$input" '.locks.nodes.root.inputs[$input]')
            if [ "$node" != "null" ]; then
              old_commit=$(printf '%s' "$metadata" | jq -r --arg node "$node" '.locks.nodes[$node].locked.rev')
              echo "OLD_COMMIT_$input_var=$old_commit" >> $GITHUB_ENV
              echo "Input $input: current commit $old_commit"
            fi
          done

      - name: Update flake inputs
        if: env.IS_UPDATE_RUN == 'true'
        run: |
          set -euo pipefail

          IFS=',' read -ra inputs <<< "$UPDATE_INPUTS"
          updated_inputs=""

          for input in "${inputs[@]}"; do
            input=$(echo "$input" | xargs)
            input_var=$(echo "$input" | tr '-' '_')

            echo "Updating input: $input"
            nix flake update "$input"

            metadata=$(nix flake metadata --json .)
            node=$(printf '%s' "$metadata" | jq -r --arg input "$input" '.locks.nodes.root.inputs[$input]')
            new_commit=$(printf '%s' "$metadata" | jq -r --arg node "$node" '.locks.nodes[$node].locked.rev')

            old_commit_var="OLD_COMMIT_$input_var"
            old_commit="${!old_commit_var:-}"

            if [ -n "$old_commit" ] && [ "$old_commit" != "$new_commit" ]; then
              if [ -z "$updated_inputs" ]; then
                updated_inputs="$input"
              else
                updated_inputs="$updated_inputs, $input"
              fi
            fi
          done

          echo "UPDATED_INPUTS=$updated_inputs" >> $GITHUB_ENV

      - name: Check for changes
        if: env.IS_UPDATE_RUN == 'true'
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Test evaluation of testing profiles
        id: testeval
        if: env.IS_UPDATE_RUN == 'true' && steps.changes.outputs.changed == 'true' && env.TEST_EVAL_ENABLED == 'true'
        continue-on-error: true
        timeout-minutes: 90
        env:
          TEST_EVAL_RESULTS_MD: ${{ runner.temp }}/test-eval-results.md
        run: |
          set -euo pipefail
          chmod +x .github/scripts/run-all-test-evals.sh .github/scripts/test-evals.d/*.sh
          .github/scripts/run-all-test-evals.sh

      - name: Record test evaluation result
        if: env.IS_UPDATE_RUN == 'true' && steps.changes.outputs.changed == 'true' && env.TEST_EVAL_ENABLED == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.testeval.outcome }}" == "success" ]; then
            echo "EVAL_FAILED=false" >> $GITHUB_ENV
          else
            echo "EVAL_FAILED=true" >> $GITHUB_ENV
          fi
          results_file="${{ runner.temp }}/test-eval-results.md"
          if [ ! -f "$results_file" ] && [ "${{ steps.testeval.outcome }}" != "success" ]; then
            {
              echo '<!-- nx-eval-results-start -->'
              echo '> [!CAUTION]'
              echo '> **Test Build Failed**'
              echo '> The test evaluation runner failed before producing results!'
              echo '<!-- nx-eval-results-end -->'
            } > "$results_file"
          fi
          if [ -f "$results_file" ]; then
            echo "EVAL_RESULTS_FILE=$results_file" >> $GITHUB_ENV
          fi

      - name: Generate commit lists
        if: env.IS_UPDATE_RUN == 'true' && steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          metadata=$(nix flake metadata --json .)

          get_lockfile_node() {
            printf '%s' "$metadata" | jq -r --arg input "$1" '.locks.nodes.root.inputs[$input]'
          }

          get_repo() {
            local node=$1

            local owner=$(jq -r --arg node "$node" '.nodes[$node].original.owner // empty' flake.lock)
            local repo=$(jq -r --arg node "$node" '.nodes[$node].original.repo // empty' flake.lock)

            if [[ -z "$owner" || -z "$repo" ]]; then
              owner=$(jq -r --arg node "$node" '.nodes[$node].locked.owner // empty' flake.lock)
              repo=$(jq -r --arg node "$node" '.nodes[$node].locked.repo // empty' flake.lock)
            fi

            if [[ -n "$owner" && -n "$repo" ]]; then
              echo "$owner/$repo"
            fi
          }

          REBOOT_NORMAL_PACKAGES=(
            "^linux[-_][0-9]"
            "^linux/"
            "^linuxKernel\.kernels\.linux:[[:space:]]"
            "^linuxKernel\.kernels\.linux[-_][0-9]"
            "^linuxPackages"
            "^kernelPackages"
            "^systemd:"
            "^systemd-"
            "^glibc"
            "^microcode"
            "^linux-firmware"
          )

          REBOOT_NIX_PACKAGES=(
            "^nix:"
            "^nix[[:space:]]"
            "^nix$"
            "^nixVersions"
            "^nixos:"
            "^lix:"
            "^lix[[:space:]]"
            "^lix$"
            "^lix_"
            "^nh:"
            "^nh[[:space:]]"
            "^nh$"
          )

          DESKTOP_REBOOT_PACKAGES=(
            "^niri"
            "^xwayland"
            "^uwsm"
          )

          REBOOT_NORMAL_PATTERNS=""
          for pattern in "${REBOOT_NORMAL_PACKAGES[@]}"; do
            if [[ "$pattern" =~ ^\^ ]]; then
              REBOOT_NORMAL_PATTERNS="${REBOOT_NORMAL_PATTERNS}${pattern}"
            else
              REBOOT_NORMAL_PATTERNS="${REBOOT_NORMAL_PATTERNS}\\b${pattern}\\b"
            fi
            REBOOT_NORMAL_PATTERNS="${REBOOT_NORMAL_PATTERNS}|"
          done
          REBOOT_NORMAL_PATTERNS="${REBOOT_NORMAL_PATTERNS%|}"

          REBOOT_NIX_PATTERNS=""
          for pattern in "${REBOOT_NIX_PACKAGES[@]}"; do
            if [[ "$pattern" =~ ^\^ ]]; then
              REBOOT_NIX_PATTERNS="${REBOOT_NIX_PATTERNS}${pattern}"
            else
              REBOOT_NIX_PATTERNS="${REBOOT_NIX_PATTERNS}\\b${pattern}\\b"
            fi
            REBOOT_NIX_PATTERNS="${REBOOT_NIX_PATTERNS}|"
          done
          REBOOT_NIX_PATTERNS="${REBOOT_NIX_PATTERNS%|}"

          DESKTOP_REBOOT_PATTERNS=""
          for pattern in "${DESKTOP_REBOOT_PACKAGES[@]}"; do
            if [[ "$pattern" =~ ^\^ ]]; then
              DESKTOP_REBOOT_PATTERNS="${DESKTOP_REBOOT_PATTERNS}${pattern}"
            else
              DESKTOP_REBOOT_PATTERNS="${DESKTOP_REBOOT_PATTERNS}\\b${pattern}\\b"
            fi
            DESKTOP_REBOOT_PATTERNS="${DESKTOP_REBOOT_PATTERNS}|"
          done
          DESKTOP_REBOOT_PATTERNS="${DESKTOP_REBOOT_PATTERNS%|}"

          BACKPORT_FILTER='^(backport:|Backport:)|\[(backport|Backport)[ -][0-9]{2}\.[0-9]{2}\]|\[Backport (release|staging)-|\[(release|staging)-.* backport\]|^- [Bb]ackport '
          STAGING_FILTER='^- Merge (staging-next|release)-[0-9]{2}\.[0-9]{2} into (staging|staging-next)-[0-9]{2}\.[0-9]{2}|\[(staging|release|Staging|Release)[- ][0-9]{2}\.[0-9]{2}\]|\[[0-9]{2}\.[0-9]{2}\]|^- (staging-next|release)-[0-9]{2}\.[0-9]{2}'
          COMMIT_FILTER_PATTERN="$BACKPORT_FILTER|$STAGING_FILTER"

          IFS=',' read -ra inputs <<< "$UPDATE_INPUTS"

          commit_lists=""
          reboot_commits=""
          requires_reboot="false"
          requires_desktop_reboot="false"
          reboot_packages=""
          desktop_reboot_packages=""
          commits_truncated="false"

          for input in "${inputs[@]}"; do
            input=$(echo "$input" | xargs)
            input_var=$(echo "$input" | tr '-' '_')
            node=$(get_lockfile_node "$input")
            repo=$(get_repo "$node")

            if [ "$node" != "null" ] && [ -n "$repo" ]; then
              new_commit=$(printf '%s' "$metadata" | jq -r --arg node "$node" '.locks.nodes[$node].locked.rev')
              old_commit_var="OLD_COMMIT_$input_var"
              old_commit="${!old_commit_var:-}"

              echo "Input $input: old commit $old_commit, new commit $new_commit"

              if [ "$old_commit" != "$new_commit" ] && [ -n "$old_commit" ]; then
                echo "Fetching commits for $input from $repo..."

                truncate_this_input="false"
                if echo ",$TRUNCATE_INPUTS," | grep -q ",$input,"; then
                  truncate_this_input="true"
                fi

                if [ "$truncate_this_input" = "true" ]; then
                  compare_json=$(curl --retry 5 --retry-all-errors --retry-delay 2 --retry-connrefused --connect-timeout 10 -m 60 -fsS -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$repo/compare/$old_commit...$new_commit") || compare_json=""
                  total_commits=$(printf '%s' "$compare_json" | jq -r '.total_commits // 0')
                  commit_lists="$commit_lists"$'\n\n'"### $input commits"$'\n'"- ($total_commits commits, details omitted)"
                else
                  raw_pages=""
                  meaningful_count=0
                  page=1
                  max_pages=30
                  while [ "$page" -le "$max_pages" ]; do
                    page_json=$(curl --retry 5 --retry-all-errors --retry-delay 2 --retry-connrefused --connect-timeout 10 -m 60 -fsS -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$repo/commits?sha=$new_commit&per_page=100&page=$page") || { raw_pages=""; break; }

                    page_count=$(printf '%s' "$page_json" | jq 'length' 2>/dev/null || echo 0)
                    if [ "$page_count" -eq 0 ]; then
                      break
                    fi

                    raw_pages="$raw_pages$page_json"$'\n'

                    boundary_hit="false"
                    if printf '%s' "$page_json" | jq -e --arg stop "$old_commit" 'any(.[]; .sha == $stop)' > /dev/null 2>&1; then
                      boundary_hit="true"
                    fi

                    page_meaningful=$(printf '%s' "$page_json" | jq -r --arg stop "$old_commit" '(map(.sha) | index($stop)) as $idx | (if $idx != null then .[:$idx] else . end) | .[] | "- \(.commit.message | split("\n")[0])"' 2>/dev/null | grep -vcE "$COMMIT_FILTER_PATTERN" || true)
                    meaningful_count=$((meaningful_count + page_meaningful))

                    if [ "$boundary_hit" = "true" ]; then
                      break
                    fi

                    if [ "$page_count" -lt 100 ]; then
                      break
                    fi

                    if [ "$meaningful_count" -ge 1000 ]; then
                      break
                    fi

                    page=$((page + 1))
                  done

                  if [ -n "$raw_pages" ]; then
                    fetch_result=$(printf '%s' "$raw_pages" | jq -s --arg stop "$old_commit" '
                      flatten(1) |
                      . as $all |
                      ($all | map(.sha) | index($stop)) as $idx |
                      {
                        commits: ((if $idx != null then $all[:$idx] else $all end) | reverse),
                        found_boundary: ($idx != null)
                      }
                    ' 2>/dev/null) || fetch_result=""

                    if [ -n "$fetch_result" ]; then
                      found_boundary=$(printf '%s' "$fetch_result" | jq -r '.found_boundary')
                      commits_json=$(printf '%s' "$fetch_result" | jq '{commits: .commits}')

                      if [ "$found_boundary" != "true" ]; then
                        echo "WARNING: Boundary commit $old_commit not found in paginated results for $input - treating as truncated"
                        if ! echo ",$EXCLUDE_FROM_REBOOT_CHECK," | grep -q ",$input,"; then
                          commits_truncated="true"
                        else
                          echo "Input $input is excluded from reboot checks - boundary miss ignored for auto-merge decision"
                        fi
                      fi

                      if ! echo ",$EXCLUDE_FROM_REBOOT_CHECK," | grep -q ",$input,"; then
                        should_check_reboot_normal="false"
                        should_check_reboot_nix="false"
                        if echo ",$REBOOT_NORMAL_CHECK_INPUTS," | grep -q ",$input,"; then
                          should_check_reboot_normal="true"
                        fi
                        if echo ",$REBOOT_NIX_CHECK_INPUTS," | grep -q ",$input,"; then
                          should_check_reboot_nix="true"
                        fi

                        if [ "$should_check_reboot_normal" = "true" ]; then
                          if echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iE "$REBOOT_NORMAL_PATTERNS" > /dev/null 2>&1; then
                            requires_reboot="true"
                            found_packages=$(echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iEo "$REBOOT_NORMAL_PATTERNS" | sort -u | tr '\n' ', ' | sed 's/,$//')
                            if [ -n "$found_packages" ]; then
                              reboot_packages="$reboot_packages$found_packages, "
                            fi

                            input_reboot_commits=$(echo "$commits_json" | jq -r --arg patterns "$REBOOT_NORMAL_PATTERNS" '.commits[]? | select(.commit.message | split("\n")[0] | split(":")[0] | test($patterns; "i")) | "- \(.commit.message | split("\n")[0]) ([\(.sha[0:7])](\(.html_url)))"' 2>/dev/null)
                            if [ -n "$input_reboot_commits" ]; then
                              reboot_commits="$reboot_commits"$'\n\n'"#### $input (System)"$'\n'"$input_reboot_commits"
                            fi
                          fi
                        fi

                        if [ "$should_check_reboot_nix" = "true" ]; then
                          if echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iE "$REBOOT_NIX_PATTERNS" > /dev/null 2>&1; then
                            requires_reboot="true"
                            found_packages=$(echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iEo "$REBOOT_NIX_PATTERNS" | sort -u | tr '\n' ', ' | sed 's/,$//')
                            if [ -n "$found_packages" ]; then
                              reboot_packages="$reboot_packages$found_packages, "
                            fi

                            input_reboot_commits=$(echo "$commits_json" | jq -r --arg patterns "$REBOOT_NIX_PATTERNS" '.commits[]? | select(.commit.message | split("\n")[0] | split(":")[0] | test($patterns; "i")) | "- \(.commit.message | split("\n")[0]) ([\(.sha[0:7])](\(.html_url)))"' 2>/dev/null)
                            if [ -n "$input_reboot_commits" ]; then
                              reboot_commits="$reboot_commits"$'\n\n'"#### $input (System)"$'\n'"$input_reboot_commits"
                            fi
                          fi
                        fi

                        if [ "$should_check_reboot_normal" = "true" ]; then
                          if echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iE "$DESKTOP_REBOOT_PATTERNS" > /dev/null 2>&1; then
                            requires_desktop_reboot="true"
                            found_desktop_packages=$(echo "$commits_json" | jq -r '.commits[]?.commit.message | split("\n")[0] | split(":")[0]' | grep -iEo "$DESKTOP_REBOOT_PATTERNS" | sort -u | tr '\n' ', ' | sed 's/,$//')
                            if [ -n "$found_desktop_packages" ]; then
                              desktop_reboot_packages="$desktop_reboot_packages$found_desktop_packages, "
                            fi

                            input_desktop_reboot_commits=$(echo "$commits_json" | jq -r --arg patterns "$DESKTOP_REBOOT_PATTERNS" '.commits[]? | select(.commit.message | split("\n")[0] | split(":")[0] | test($patterns; "i")) | "- \(.commit.message | split("\n")[0]) ([\(.sha[0:7])](\(.html_url)))"' 2>/dev/null)
                            if [ -n "$input_desktop_reboot_commits" ]; then
                              reboot_commits="$reboot_commits"$'\n\n'"#### $input (Desktop)"$'\n'"$input_desktop_reboot_commits"
                            fi
                          fi
                        fi
                      fi

                      all_commits_full=$(echo "$commits_json" | jq -r '.commits[]? | "- \(.commit.message | split("\n")[0]) ([\(.sha[0:7])](\(.html_url)))"' 2>/dev/null)

                      regular_commits_full=$(echo "$all_commits_full" | grep -vE "$COMMIT_FILTER_PATTERN" || true)
                      regular_commits_full=$(printf '%s\n' "$regular_commits_full" | awk '{key=$0; sub(/ \(\[[0-9a-f]+\]\([^)]*\)\)$/,"",key); lines[NR]=$0; keys[NR]=key; last[key]=NR; total=NR} END{for(i=1;i<=total;i++) if(last[keys[i]]==i) print lines[i]}')

                      backport_count=$(printf '%s\n' "$all_commits_full" | grep -cE "$BACKPORT_FILTER" || true)
                      staging_count=$(printf '%s\n' "$all_commits_full" | grep -cE "$STAGING_FILTER" || true)

                      if [ -n "$regular_commits_full" ]; then
                        should_reduce_commit_subjects="false"
                        if echo ",$NIXPKGS_INPUTS," | grep -q ",$input,"; then
                          should_reduce_commit_subjects="true"
                        fi

                        if [ "$should_reduce_commit_subjects" = "true" ]; then
                          package_names=$(printf '%s\n' "$regular_commits_full" | sed -E 's/^- //; s/ \\(\\[[^]]+\\]\\([^)]*\\)\\)$//' | cut -d: -f1 | sed -E 's/[[:space:]]+$//' | sort -fu)

                          highlight_list=""
                          other_list=""
                          highlight_csv="${PACKAGES_TO_HIGHLIGHT:-}"
                          highlight_norm=$(printf '%s\n' "$highlight_csv" | tr ',' '\n' | sed '/^$/d' | tr '[:upper:]' '[:lower:]' | sort -fu)
                          other_updates_line=""

                          while IFS= read -r pkg; do
                            [ -z "$pkg" ] && continue

                            pkg_norm=$(printf '%s' "$pkg" | tr '[:upper:]' '[:lower:]')
                            if [ -n "$highlight_norm" ] && printf '%s\n' "$highlight_norm" | grep -qxF "$pkg_norm"; then
                              if [ -z "$highlight_list" ]; then
                                highlight_list="- $pkg"
                              else
                                highlight_list="$highlight_list"$'\n'"- $pkg"
                              fi
                            else
                              if [ -z "$other_list" ]; then
                                other_list="$pkg"
                              else
                                other_list="$other_list, $pkg"
                              fi
                            fi
                          done <<< "$package_names"

                          regular_commits=""
                          if [ -n "$highlight_list" ]; then
                            regular_commits="$highlight_list"
                          fi
                          if [ -n "$other_list" ]; then
                            other_updates_line="<b>Other Updates</b>: $other_list"
                          fi
                        else
                          regular_commits="$regular_commits_full"
                        fi
                        commit_count=$(echo "$regular_commits" | wc -l)
                        if [ "$commit_count" -gt 500 ]; then
                          commits_to_show=$(echo "$regular_commits" | head -500)
                          commits_to_show="$commits_to_show"$'\n'"- ... and $(($commit_count - 500)) more commits"
                        else
                          commits_to_show="$regular_commits"
                        fi

                        if [ "$should_reduce_commit_subjects" = "true" ]; then
                          filtered_total=$((backport_count + staging_count))
                          if [ "$filtered_total" -gt 0 ]; then
                            if [ -n "$commits_to_show" ]; then
                              commits_to_show="$commits_to_show"$'\n\n'
                            fi
                            commits_to_show="$commits_to_show<b>Filtered</b>:"$'\n'
                            if [ "$backport_count" -gt 0 ]; then
                              commits_to_show="$commits_to_show- $backport_count backport commits filtered out"$'\n'
                            fi
                            if [ "$staging_count" -gt 0 ]; then
                              commits_to_show="$commits_to_show- $staging_count staging/release merge commits filtered out"$'\n'
                            fi
                            commits_to_show=$(printf '%s' "$commits_to_show" | sed -E 's/\n$//')
                          fi
                          if [ -n "$other_updates_line" ]; then
                            if [ -n "$commits_to_show" ]; then
                              commits_to_show="$commits_to_show"$'\n\n'
                            fi
                            commits_to_show="$commits_to_show$other_updates_line"
                          fi
                        fi

                        commit_lists="$commit_lists"$'\n\n'"### $input commits"$'\n'"$commits_to_show"

                      else
                        filtered_total=$((backport_count + staging_count))
                        if [ "$filtered_total" -gt 0 ]; then
                          commit_lists="$commit_lists"$'\n\n'"### $input commits"$'\n'"- ($backport_count backport commits filtered out)"
                          if [ "$staging_count" -gt 0 ]; then
                            commit_lists="$commit_lists"$'\n'"- ($staging_count staging/release merge commits filtered out)"
                          fi
                        fi
                      fi
                    else
                      echo "WARNING: Could not parse commits for $input - treating as manual merge required"
                      if ! echo ",$EXCLUDE_FROM_REBOOT_CHECK," | grep -q ",$input,"; then
                        commits_truncated="true"
                      else
                        echo "Input $input is excluded from reboot checks - parse failure ignored for auto-merge decision"
                      fi
                    fi
                  else
                    echo "WARNING: Could not fetch commits for $input - treating as manual merge required"
                    if ! echo ",$EXCLUDE_FROM_REBOOT_CHECK," | grep -q ",$input,"; then
                      commits_truncated="true"
                    else
                      echo "Input $input is excluded from reboot checks - fetch failure ignored for auto-merge decision"
                    fi
                  fi
                fi
              fi
            fi
          done

          reboot_packages=$(echo "$reboot_packages" | sed 's/, $//')
          desktop_reboot_packages=$(echo "$desktop_reboot_packages" | sed 's/, $//')

          any_reboot_required="false"
          if [ "$requires_reboot" = "true" ] || [ "$requires_desktop_reboot" = "true" ]; then
            any_reboot_required="true"
          fi

          echo "REQUIRES_REBOOT=$requires_reboot" >> $GITHUB_ENV
          echo "REQUIRES_DESKTOP_REBOOT=$requires_desktop_reboot" >> $GITHUB_ENV
          echo "ANY_REBOOT_REQUIRED=$any_reboot_required" >> $GITHUB_ENV
          echo "REBOOT_PACKAGES=$reboot_packages" >> $GITHUB_ENV
          echo "DESKTOP_REBOOT_PACKAGES=$desktop_reboot_packages" >> $GITHUB_ENV
          echo "COMMITS_TRUNCATED=$commits_truncated" >> $GITHUB_ENV

          cl_delim="NXCOMMITLISTS$(openssl rand -hex 16)"
          {
            echo "COMMIT_LISTS<<${cl_delim}"
            echo "$commit_lists"
            echo "${cl_delim}"
          } >> $GITHUB_ENV

          rc_delim="NXREBOOTCOMMITS$(openssl rand -hex 16)"
          {
            echo "REBOOT_COMMITS<<${rc_delim}"
            echo "$reboot_commits"
            echo "${rc_delim}"
          } >> $GITHUB_ENV

          if [ "$requires_reboot" = "true" ] || [ "$requires_desktop_reboot" = "true" ] || [ "${PR_REQUIRES_REBOOT:-false}" = "true" ]; then
            core_flake_hash=$(sha256sum flake.lock | cut -d' ' -f1)
            mkdir -p .core-state
            if [ "$requires_reboot" = "true" ] || [ "${PR_REQUIRES_SYSTEM_REBOOT:-false}" = "true" ]; then
              echo "Creating system reboot marker file for auto-upgrade detection"
              echo "$core_flake_hash" > .core-state/reboot-required
            fi
            if [ "$requires_desktop_reboot" = "true" ] || [ "${PR_REQUIRES_DESKTOP_REBOOT:-false}" = "true" ]; then
              echo "Creating desktop reboot marker file for auto-upgrade detection"
              echo "$core_flake_hash" > .core-state/desktop-reboot-required
            fi
          fi

      - name: Build PR body
        if: env.IS_UPDATE_RUN == 'true' && steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pr_tmpfile=$(mktemp)

          cat >> "$pr_tmpfile" <<'NX_PR_STATIC'
          ## Automated update of flake inputs.
          ${{ (env.REQUIRES_REBOOT == 'true' || env.PR_REQUIRES_SYSTEM_REBOOT == 'true') && '<!-- nx-reboot-system -->' || '' }}
          ${{ (env.REQUIRES_DESKTOP_REBOOT == 'true' || env.PR_REQUIRES_DESKTOP_REBOOT == 'true') && '<!-- nx-reboot-desktop -->' || '' }}
          ${{ (env.COMMITS_TRUNCATED == 'true' || env.PR_COMMITS_TRUNCATED == 'true') && '<!-- nx-commits-truncated -->' || '' }}
          ${{ env.EVAL_FAILED == 'true' && '<!-- nx-eval-failed -->' || '' }}

          NX_PR_STATIC

          if [ -n "${EVAL_RESULTS_FILE:-}" ] && [ -f "${EVAL_RESULTS_FILE:-}" ]; then
            cat "$EVAL_RESULTS_FILE" >> "$pr_tmpfile"
            echo '' >> "$pr_tmpfile"
          fi

          cat >> "$pr_tmpfile" <<'NX_PR_STATIC'
          ${{ env.ANY_REBOOT_REQUIRED == 'true' && '> [!WARNING]' || '' }}
          ${{ env.ANY_REBOOT_REQUIRED == 'true' && '> ⚠️ **Reboot Required** ⚠️' || '' }}
          ${{ env.ANY_REBOOT_REQUIRED == 'true' && '> This update requires a reboot!' || '' }}

          ${{ env.PR_REQUIRES_REBOOT == 'true' && env.ANY_REBOOT_REQUIRED != 'true' && '> [!WARNING]' || '' }}
          ${{ env.PR_REQUIRES_REBOOT == 'true' && env.ANY_REBOOT_REQUIRED != 'true' && '> ⚠️ **Manual Merge Required (Preserved)** ⚠️' || '' }}
          ${{ env.PR_REQUIRES_REBOOT == 'true' && env.ANY_REBOOT_REQUIRED != 'true' && '> Previous update required reboot - state preserved across updates' || '' }}

          ${{ (env.COMMITS_TRUNCATED == 'true' || env.PR_COMMITS_TRUNCATED == 'true') && env.ANY_REBOOT_REQUIRED != 'true' && env.PR_REQUIRES_REBOOT != 'true' && '> [!WARNING]' || '' }}
          ${{ (env.COMMITS_TRUNCATED == 'true' || env.PR_COMMITS_TRUNCATED == 'true') && env.ANY_REBOOT_REQUIRED != 'true' && env.PR_REQUIRES_REBOOT != 'true' && '> ⚠️ **Manual Merge Required (Truncation)** ⚠️' || '' }}
          ${{ (env.COMMITS_TRUNCATED == 'true' || env.PR_COMMITS_TRUNCATED == 'true') && env.ANY_REBOOT_REQUIRED != 'true' && env.PR_REQUIRES_REBOOT != 'true' && '> Could not retrieve complete commit history - cannot verify all commits for reboot requirements' || '' }}

          NX_PR_STATIC

          if [ "$ANY_REBOOT_REQUIRED" = "true" ]; then
            {
              echo ''
              echo '### 🔄 Reboot-triggering commits'
              printf '%s\n' "$REBOOT_COMMITS"
              echo '---'
            } >> "$pr_tmpfile"
          fi

          {
            echo ''
            echo '### 📦 Updated inputs:'
            echo "- $UPDATED_INPUTS"
            printf '%s\n' "$COMMIT_LISTS"
            echo ''
            echo 'Generated automatically by GitHub Actions'
          } >> "$pr_tmpfile"

          LC_ALL=C awk -v max=64000 '{a=length($0)+1; if(t+a>max){print ""; print "_(truncated to fit the GitHub size limit)_"; exit} print; t+=a}' \
            "$pr_tmpfile" > "${pr_tmpfile}.out"
          mv "${pr_tmpfile}.out" "$pr_tmpfile"

          env_delim="NXPRBODY$(openssl rand -hex 16)"
          {
            echo "PR_BODY<<${env_delim}"
            cat "$pr_tmpfile"
            echo "${env_delim}"
          } >> "$GITHUB_ENV"
          rm -f "$pr_tmpfile"

      - name: Create Pull Request
        if: env.IS_UPDATE_RUN == 'true' && steps.changes.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.UPDATE_AUTO_MERGE_ENABLED == 'true' && secrets.REPO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "Update flake inputs: ${{ env.UPDATED_INPUTS }}"
          title: "Update flake inputs: ${{ env.UPDATED_INPUTS }}"
          body: ${{ env.PR_BODY }}
          branch: update-flake-inputs
          delete-branch: true
          sign-commits: true
          draft: ${{ (github.event_name != 'workflow_dispatch' || env.EVAL_FAILED == 'true') && 'always-true' || 'false' }}

      - name: Re-run test evaluation on current core
        if: (env.RE_EVAL_ONLY == 'true') || (env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && env.PR_EVAL_FAILED == 'true' && env.TEST_EVAL_ENABLED == 'true')
        continue-on-error: true
        timeout-minutes: 90
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          workdir=$(mktemp -d)
          git fetch origin update-flake-inputs
          git checkout FETCH_HEAD -- flake.lock

          eval_ok=true
          chmod +x .github/scripts/run-all-test-evals.sh .github/scripts/test-evals.d/*.sh
          if ! TEST_EVAL_RESULTS_MD="$workdir/results.md" .github/scripts/run-all-test-evals.sh; then
            eval_ok=false
          fi

          if [ -f "$workdir/results.md" ]; then
            gh pr view "${{ env.PR_NUMBER }}" --json body -q .body > "$workdir/body.txt"
            awk -v mdfile="$workdir/results.md" '
              /<!-- nx-eval-results-start -->/ {
                skip = 1
                found = 1
                while ((getline line < mdfile) > 0) print line
                close(mdfile)
                next
              }
              /<!-- nx-eval-results-end -->/ { skip = 0; next }
              !skip { print }
              END {
                if (!found) {
                  print ""
                  while ((getline line < mdfile) > 0) print line
                  close(mdfile)
                }
              }
            ' "$workdir/body.txt" > "$workdir/new-body.txt"
            if [ "$eval_ok" == "true" ]; then
              grep -vF '<!-- nx-eval-failed -->' "$workdir/new-body.txt" > "$workdir/new-body-clean.txt" || true
              mv "$workdir/new-body-clean.txt" "$workdir/new-body.txt"
            fi
            gh pr edit "${{ env.PR_NUMBER }}" --body-file "$workdir/new-body.txt"
          fi

          if [ "$eval_ok" == "true" ]; then
            echo "Evaluation succeeds now - failure marker cleared from PR body"
            echo "PR_EVAL_FAILED=false" >> $GITHUB_ENV
          else
            echo "Evaluation still failing - keeping failure marker"
          fi

      - name: Workflow dispatch - Mark PR ready
        if: github.event_name == 'workflow_dispatch' && env.EVAL_FAILED != 'true' && !(env.RE_EVAL_ONLY == 'true' && env.PR_EVAL_FAILED == 'true') && (steps.cpr.outputs.pull-request-number != '' || env.PR_EXISTS == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.cpr.outputs.pull-request-number || env.PR_NUMBER }}"
          if [ -n "$pr_number" ]; then
            gh pr ready "$pr_number" || true
          fi

      - name: Merge week - Un-draft PR
        if: env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && env.PR_EVAL_FAILED != 'true'
        run: |
          set -euo pipefail
          if [ "${{ env.PR_DRAFT }}" == "true" ]; then
            echo "Un-drafting PR #${{ env.PR_NUMBER }}"
            gh pr ready "${{ env.PR_NUMBER }}" || true
          else
            echo "PR #${{ env.PR_NUMBER }} is already ready for review"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge week - Enable auto-merge
        if: env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && env.UPDATE_AUTO_MERGE_ENABLED == 'true' && env.PR_REQUIRES_REBOOT != 'true' && env.PR_COMMITS_TRUNCATED != 'true' && env.PR_EVAL_FAILED != 'true' && env.PR_AUTO_MERGE_ENABLED != 'true' && env.PR_CONFLICTED != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          set -euo pipefail

          notify_automerge_enabled() {
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }}"
            curl -fsS -m 20 --retry 10 -o /dev/null \
              --form-string "token=${PUSHOVER_TOKEN}" \
              --form-string "user=${PUSHOVER_USER}" \
              --form-string "message=<b>Repository:</b> ${{ github.repository }}<br><b>PR #${{ env.PR_NUMBER }}</b> auto-merge enabled<br><br>✅ Will merge automatically once checks pass" \
              --form-string "title=🟢 Auto-merge Enabled for ${{ github.repository }}" \
              --form-string "priority=0" \
              --form-string "sound=pianobar" \
              --form-string "ttl=129600" \
              --form-string "html=1" \
              --form-string "url=$PR_URL" \
              --form-string "url_title=View Pull Request" \
              https://api.pushover.net/1/messages.json || true
          }

          echo "Enabling auto-merge for PR #${{ env.PR_NUMBER }}"
          sleep 10

          for attempt in {1..10}; do
            echo "Attempt $attempt/10: Enabling auto-merge..."
            if gh pr merge --auto --squash "${{ env.PR_NUMBER }}"; then
              echo "Auto-merge enabled successfully on attempt $attempt"
              notify_automerge_enabled
              exit 0
            else
              echo "Auto-merge failed on attempt $attempt"
              if [ $attempt -eq 10 ]; then
                echo "All 10 attempts failed. Exiting..."
                exit 1
              fi
              sleep_time="$(( 5 + $attempt ))"
              sleep $sleep_time
            fi
          done

      - name: Merge week - Send merge reminder
        if: env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && (env.UPDATE_AUTO_MERGE_ENABLED != 'true' || env.PR_REQUIRES_REBOOT == 'true' || env.PR_COMMITS_TRUNCATED == 'true' || env.PR_EVAL_FAILED == 'true' || env.PR_CONFLICTED == 'true') && (env.PR_MERGE_NOTIFIED != 'true' || env.IS_FIRST_MERGE_DAY == 'true')
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ env.IS_FIRST_MERGE_DAY }}" == "true" ]; then
            gh pr edit "${{ env.PR_NUMBER }}" --remove-label flake-merge-notified > /dev/null 2>&1 || true
          fi

          if [ "${{ env.PR_CONFLICTED }}" == "true" ]; then
            PRIORITY="1"
            SOUND="gamelan"
            TTL="604800"
            CIRCLE_COLOR="🔴"
            STATUS="Merge Window Open (Conflict)"
            EXTRA_MESSAGE="⚠️ <b>Merge conflict</b> - Resolve manually before merging"
          elif [ "${{ env.PR_EVAL_FAILED }}" == "true" ]; then
            PRIORITY="1"
            SOUND="gamelan"
            TTL="604800"
            CIRCLE_COLOR="🔴"
            STATUS="Merge Window Open (Test Build Failed)"
            EXTRA_MESSAGE="❌ <b>Test build failed</b> - Testing profile evaluation failed, PR kept as draft"
          elif [ "${{ env.PR_REQUIRES_REBOOT }}" == "true" ]; then
            PRIORITY="1"
            SOUND="gamelan"
            TTL="604800"
            CIRCLE_COLOR="🟡"
            STATUS="Merge Window Open (Reboot Required)"
            EXTRA_MESSAGE="⚠️ <b>Reboot Required</b> - Merge manually and reboot after"
          elif [ "${{ env.PR_COMMITS_TRUNCATED }}" == "true" ]; then
            PRIORITY="1"
            SOUND="gamelan"
            TTL="604800"
            CIRCLE_COLOR="🟡"
            STATUS="Merge Window Open (Review Required)"
            EXTRA_MESSAGE="⚠️ <b>Incomplete commit history</b> - Cannot verify reboot requirements, review manually"
          else
            PRIORITY="0"
            SOUND="pianobar"
            TTL="604800"
            CIRCLE_COLOR="🟢"
            STATUS="Merge Window Open"
            EXTRA_MESSAGE="✅ Flake update ready to merge"
          fi

          PR_URL="https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }}"
          MESSAGE="<b>Repository:</b> ${{ github.repository }}<br><b>PR #${{ env.PR_NUMBER }}</b> is ready to merge<br><br>$EXTRA_MESSAGE"

          curl -fsS -m 20 --retry 10 -o /dev/null \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "message=$MESSAGE" \
            --form-string "title=${CIRCLE_COLOR} $STATUS for ${{ github.repository }}" \
            --form-string "priority=${PRIORITY}" \
            --form-string "sound=${SOUND}" \
            --form-string "ttl=${TTL}" \
            --form-string "html=1" \
            --form-string "url=$PR_URL" \
            --form-string "url_title=View Pull Request" \
            https://api.pushover.net/1/messages.json || true

          gh label create flake-merge-notified --color BFD4F2 --description "Flake merge reminder delivered" --force > /dev/null 2>&1 || true
          gh pr edit "${{ env.PR_NUMBER }}" --add-label flake-merge-notified || true

      - name: Merge week - Auto-merge stuck reminder
        if: env.CYCLE_MODE == 'merge' && env.PR_EXISTS == 'true' && env.UPDATE_AUTO_MERGE_ENABLED == 'true' && env.PR_AUTO_MERGE_ENABLED == 'true' && env.PR_CHECKS_FAILED == 'true' && env.PR_REQUIRES_REBOOT != 'true' && env.PR_COMMITS_TRUNCATED != 'true' && env.PR_EVAL_FAILED != 'true' && env.PR_CONFLICTED != 'true' && (env.PR_AUTOMERGE_STUCK_NOTIFIED != 'true' || env.IS_FIRST_MERGE_DAY == 'true')
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ env.IS_FIRST_MERGE_DAY }}" == "true" ]; then
            gh pr edit "${{ env.PR_NUMBER }}" --remove-label flake-automerge-stuck > /dev/null 2>&1 || true
          fi

          PR_URL="https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }}"
          MESSAGE="<b>Repository:</b> ${{ github.repository }}<br><b>PR #${{ env.PR_NUMBER }}</b> has auto-merge enabled but is still open<br><br>⚠️ <b>A required check is failing</b> - review the PR manually"

          curl -fsS -m 20 --retry 10 -o /dev/null \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "message=$MESSAGE" \
            --form-string "title=🟠 Auto-merge Stuck for ${{ github.repository }}" \
            --form-string "priority=1" \
            --form-string "sound=gamelan" \
            --form-string "ttl=604800" \
            --form-string "html=1" \
            --form-string "url=$PR_URL" \
            --form-string "url_title=View Pull Request" \
            https://api.pushover.net/1/messages.json || true

          gh label create flake-automerge-stuck --color D93F0B --description "Auto-merge enabled but PR still open" --force > /dev/null 2>&1 || true
          gh pr edit "${{ env.PR_NUMBER }}" --add-label flake-automerge-stuck || true

      - name: Merge week - First-run dedup cache
        id: mergewindow-cache
        if: env.CYCLE_MODE == 'merge'
        uses: actions/cache@v6
        with:
          path: .mergewindow-marker
          key: merge-window-${{ env.MERGE_CYCLE_ID }}

      - name: Merge week - No pending update notification
        if: env.CYCLE_MODE == 'merge' && env.PR_FETCH_OK == 'true' && env.PR_EXISTS != 'true' && steps.mergewindow-cache.outputs.cache-hit != 'true'
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          set -euo pipefail

          curl -fsS -m 20 --retry 10 -o /dev/null \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "message=No flake update is pending for ${{ github.repository }} this cycle." \
            --form-string "title=⚪ No Pending Update for ${{ github.repository }}" \
            --form-string "priority=-1" \
            --form-string "sound=none" \
            --form-string "ttl=86400" \
            --form-string "html=1" \
            https://api.pushover.net/1/messages.json || true

      - name: Merge week - Record first-run marker
        if: env.CYCLE_MODE == 'merge' && env.PR_FETCH_OK == 'true' && steps.mergewindow-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .mergewindow-marker
          date > .mergewindow-marker/handled

  record-merge-window-cache:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'update-flake-inputs' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Determine merge cycle id
        run: |
          set -euo pipefail
          echo "MERGE_CYCLE_ID=$(date +%GW%V)" >> $GITHUB_ENV

      - name: Merge window cache
        id: mergewindow-cache
        uses: actions/cache@v6
        with:
          path: .mergewindow-marker
          key: merge-window-${{ env.MERGE_CYCLE_ID }}

      - name: Record merge marker
        if: steps.mergewindow-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .mergewindow-marker
          date > .mergewindow-marker/handled
