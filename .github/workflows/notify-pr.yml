name: Notify on Pull Request

on:
  pull_request:
    types: [opened, edited, closed, reopened]
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Determine active PR token
        id: token
        env:
          REPO_PR_TOKEN: ${{ secrets.REPO_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${REPO_PR_TOKEN:-}" ]; then
            echo "is_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify PR Status via Pushover
        if: ${{ !(steps.token.outputs.is_pat == 'true' && github.event.pull_request.head.ref == 'update-flake-inputs' && (github.event.action == 'opened' || github.event.action == 'edited')) }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          STATUS="New PR"
          CIRCLE_COLOR="🔵"
          PRIORITY="0"
          SOUND="vibrate"
          TTL="129600"

          if [ "${{ github.event.action }}" == "edited" ]; then
            STATUS="Changed PR"
            CIRCLE_COLOR="🟡"
            PRIORITY="0"
            SOUND="vibrate"
            TTL="43200"
          elif [ "${{ github.event.action }}" == "closed" ]; then
            if [ "${{ github.event.pull_request.merged }}" == "true" ]; then
              STATUS="Merged PR"
              CIRCLE_COLOR="🟢"
              PRIORITY="0"
              SOUND="pianobar"
              TTL="129600"
            else
              STATUS="Closed PR"
              CIRCLE_COLOR="🔴"
              PRIORITY="0"
              SOUND="pushover"
              TTL="604800"
            fi
          elif [ "${{ github.event.action }}" == "reopened" ]; then
            STATUS="Reopened PR"
            CIRCLE_COLOR="🔵"
            PRIORITY="0"
            SOUND="vibrate"
            TTL="129600"
          fi

          MESSAGE="<b>Repository:</b> ${{ github.repository }}<br><b>Branch:</b> ${{ github.ref_name }}<br><b>Pull Request Title:</b> ${TITLE}"

          if [ "$HEAD_REF" == "update-flake-inputs" ] && [ "${{ github.event.action }}" != "closed" ]; then
            if printf '%s' "$PR_BODY" | grep -q '<!-- nx-reboot-system -->' || printf '%s' "$PR_BODY" | grep -q '<!-- nx-reboot-desktop -->'; then
              PRIORITY="1"
              SOUND="gamelan"
              TTL="604800"
              CIRCLE_COLOR="🟡"
              STATUS="$STATUS (Manual Review Required)"
              MESSAGE="$MESSAGE<br><br>⚠️ <b>Reboot Required</b> - Auto-merge disabled"
            elif printf '%s' "$PR_BODY" | grep -q '<!-- nx-commits-truncated -->'; then
              PRIORITY="1"
              SOUND="gamelan"
              TTL="604800"
              CIRCLE_COLOR="🟡"
              STATUS="$STATUS (Manual Review Required)"
              MESSAGE="$MESSAGE<br><br>⚠️ <b>Commits truncated (&gt;250)</b> - Cannot verify reboot requirements - Auto-merge disabled"
            fi
          fi

          curl -fsS -m 20 --retry 10 -o /dev/null \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "message=$MESSAGE" \
            --form-string "title=${CIRCLE_COLOR} $STATUS for ${{ github.repository }}: ${TITLE}" \
            --form-string "priority=${PRIORITY}" \
            --form-string "sound=${SOUND}" \
            --form-string "ttl=${TTL}" \
            --form-string "html=1" \
            --form-string "url=${{ github.event.pull_request.html_url }}" \
            --form-string "url_title=View Pull Request" \
            https://api.pushover.net/1/messages.json

      - name: Trigger nxconfig bump on manual merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'update-flake-inputs'
        env:
          NXCONFIG_PAT: ${{ secrets.NXCONFIG_PAT }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: token ${NXCONFIG_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/nx-personal-config/dispatches" \
            -d '{"event_type":"nxcore-merged"}'
